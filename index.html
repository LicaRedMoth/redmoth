<!DOCTYPE html>
<html lang="ru">
<head>

  <link rel="icon" href="res/ico.png" type="image/x-icon">
  <meta charset="UTF-8">

  <link rel="stylesheet" href="style.css">

  <meta property="og:title" content="L:\REDMOTH.MOE">
  <meta property="og:description" content="Experimental music and archive stuff">

</head>
  
</head>
<body>
  <div id="header-placeholder"></div>

  <div class="logo-container">
    <div style="position: relative; display: inline-block;">
      <!-- Сплеш-надпись привязана непосредственно к контейнеру логотипа -->
      <div id="splash"></div>
      <img src="res/logo.avif" alt="Логотип" class="logo">
    </div>
    
    <div id="archive-counter" class="apng-container">
    <span style="font-family: monospace; opacity: 0.5;">Loading...</span>
</div>
    <ul class="index">
      <div><video class="webm-emoji" autoplay loop muted playsinline><source src="emj/blackrandom_AgAD2SAAApfmiEo.webm" type="video/webm"></video>Open Source Audio Counter™<video class="webm-emoji" autoplay loop muted playsinline><source src="emj/blackrandom_AgAD2SAAApfmiEo.webm" type="video/webm"></video></div>
  </ul>
  </div>

  <ul class="index">
    <div>latest release<video class="webm-emoji" autoplay loop muted playsinline><source src="emj/blackrandom_AgADNR4AAil6iEo.webm" type="video/webm"></video></div>
  </ul>

<div class="black-rectangle">
  <iframe src="https://bandcamp.com/EmbeddedPlayer/track=1835872302/size=large/bgcol=333333/linkcol=e32c14/tracklist=false/artwork=small/transparent=true/" seamless>
    <a href="https://licaredmoth.bandcamp.com/track/cariprazine">Cariprazine by RedMoth</a>
  </iframe>
</div>

  <div id="footer-placeholder"></div>

  <script>
  fetch("splashes.json")
    .then(response => response.json())
    .then(splashes => {
      const splash = splashes[Math.floor(Math.random() * splashes.length)];
      document.getElementById("splash").textContent = splash;
    });
</script>
<script>
  function loadHTML(id, file) {
    fetch(file)
        .then(response => response.text())
        .then(data => {
            document.getElementById(id).innerHTML = data;
            // Если загрузили футер — сразу подставляем год
            if (id === 'footer-placeholder') {
                document.getElementById("year").textContent = new Date().getFullYear();
            }
        });
}

    // Загружаем шапку и подвал
    loadHTML('header-placeholder', 'header.html');
    loadHTML('footer-placeholder', 'footer.html');
  </script>
  <script>
    async function updateApngCounter() {
        const url = 'https://archive.org/advancedsearch.php?q=collection:(opensource_audio)&rows=0&output=json';
        const container = document.getElementById('archive-counter');

        try {
            const response = await fetch(url);
            const data = await response.json();
            
            // Получаем число и переводим его в строку (например, "2998326")
            const countStr = data.response.numFound.toString();
            
            // Очищаем контейнер от текста "Loading..."
            container.innerHTML = '';

            // Проходим циклом по каждому символу в строке
            for (let char of countStr) {
                const img = document.createElement('img');
                // Формируем путь к картинке: res/0.apng, res/1.apng и т.д.
                img.src = `res/${char}.apng`;
                img.alt = char;
                // Можно добавить небольшой стиль, чтобы цифры не слипались
                img.style.display = "inline-block";
                
                container.appendChild(img);
            }
        } catch (error) {
            console.error('Ошибка счетчика:', error);
            container.innerHTML = 'error';
        }
    }

    updateApngCounter();
</script>
</body>
</html>
